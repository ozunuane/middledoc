version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: accountant-hub-db
    environment:
      POSTGRES_USER: accountant
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: accountant_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountant"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accountant-hub-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://accountant:dev_password_change_me@postgres:5432/accountant_hub
      NEXTAUTH_SECRET: your_secret_key_change_this
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: npm run dev

volumes:
  postgres_data:
