version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: accountant-hub-db
    environment:
      POSTGRES_USER: accountant
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: accountant_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountant"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accountant-hub-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://accountant:dev_password_change_me@postgres:5432/accountant_hub
      NEXTAUTH_SECRET: your_secret_key_change_this
      NEXTAUTH_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: npm run dev
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: accountant-hub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
