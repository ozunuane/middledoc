user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             application/rss+xml font/truetype font/opentype
             application/vnd.ms-fontobject image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  # Upstream Next.js app
  upstream app {
    server app:3000;
  }

  # HTTP server - redirect to HTTPS in production
  server {
    listen 80;
    server_name _;

    # Allow health checks without redirect
    location /api/auth/me {
      proxy_pass http://app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Serve static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://app;
      proxy_cache_valid 30d;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=2592000";
    }

    # Proxy all requests to Next.js app
    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Timeouts for long-running requests
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # API rate limiting
    location /api/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Deny access to .env and other sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }

  # HTTPS server (for production with Let's Encrypt)
  # Uncomment and configure when deploying with SSL certificate
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com www.your-domain.com;
  #
  #   ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   # Same location blocks as above...
  # }
  #
  # # HTTP to HTTPS redirect
  # server {
  #   listen 80;
  #   server_name your-domain.com www.your-domain.com;
  #   return 301 https://$server_name$request_uri;
  # }
}
